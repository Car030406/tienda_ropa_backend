<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CARO'S STORE</title>

  <style>
    body {
      font-family: Arial;
      background: #ffc2d9;
      padding: 20px;
    }

    h1 { text-align: center; }

    input {
      padding: 8px;
      margin: 5px;
      width: 90%;
    }

    button {
      padding: 10px;
      background: #e6608d;
      color: white;
      border: none;
      cursor: pointer;
    }

    .card {
      background: black;
      color: white;
      padding: 10px;
      margin: 10px;
    }

    img {
      width: 100%;
    }
  </style>
</head>

<body>

<h1>CARO'S STORE</h1>

<input id="nombre" placeholder="Nombre"><br>
<input id="precio" placeholder="Precio"><br>
<input id="talla" placeholder="Talla"><br>
<input id="imagen" placeholder="URL Imagen"><br>

<button onclick="guardar()">Guardar</button>

<h2>Productos</h2>
<div id="lista"></div>

<script>

const API = "https://tienda-ropa-backend-1.onrender.com/api/productos";
let editId = null;

function cargar() {
  fetch(API)
    .then(r => r.json())
    .then(data => {
      let html = "";

      data.forEach(p => {
        html += `
        <div class="card">
          <img src="${p.imagen || 'https://via.placeholder.com/300'}">
          <h3>${p.nombre}</h3>
          <p>$${p.precio}</p>
          <p>${p.talla}</p>

          <button onclick="editar(${p.id}, '${p.nombre}', '${p.precio}', '${p.talla}', '${p.imagen || ""}')">Editar</button>
          <button onclick="eliminar(${p.id})">Eliminar</button>
        </div>
        `;
      });

      document.getElementById("lista").innerHTML = html;
    });
}

function guardar() {
  const nombre = document.getElementById("nombre").value;
  const precio = document.getElementById("precio").value;
  const talla = document.getElementById("talla").value;
  const imagen = document.getElementById("imagen").value;

  const data = { nombre, precio, talla, imagen };

  if (editId) {
    fetch(API + "/" + editId, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    }).then(() => {
      editId = null;
      limpiar();
      cargar();
    });
  } else {
    fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    }).then(() => {
      limpiar();
      cargar();
    });
  }
}

function editar(id, nombre, precio, talla, imagen) {
  document.getElementById("nombre").value = nombre;
  document.getElementById("precio").value = precio;
  document.getElementById("talla").value = talla;
  document.getElementById("imagen").value = imagen;

  editId = id;
}

function eliminar(id) {
  fetch(API + "/" + id, { method: "DELETE" })
    .then(() => cargar());
}

function limpiar() {
  document.getElementById("nombre").value = "";
  document.getElementById("precio").value = "";
  document.getElementById("talla").value = "";
  document.getElementById("imagen").value = "";
}

window.onload = cargar;

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CARO'S STORE</title>

  <style>
    body {
      font-family: Georgia, 'Times New Roman', Times, serif, sans-serif;
      background: #ffc2d9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    h2 {
      margin-top: 30px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 90%;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: rgb(230, 96, 141);
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: rgb(189, 26, 134);
    }

    .form-container {
      background: black;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgb(189, 26, 134);
      max-width: 400px;
      margin: auto;
      text-align: center;
      color:#ccc;
    }

    #lista {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: black;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgb(189, 26, 134);
      transition: transform 0.2s;
      color:#ccc;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .card button {
      margin-top: 5px;
      width: 100%;
    }
  </style>
</head>

<body>

  <h1>CARO'S STORE</h1>

  <div class="form-container">
    <h2>Agregar / Editar producto</h2>

    <input id="nombre" placeholder="Nombre"><br>
    <input id="precio" placeholder="Precio" type="number"><br>
    <input id="talla" placeholder="Talla"><br>
    <input id="imagen" placeholder="https://via.placeholder.com/300"><br>

    <button onclick="agregarProducto()">Guardar</button>
  </div>

  <h2>Productos</h2>
  <div id="lista"></div>

  <script>
    const API_URL = "https://tienda-ropa-backend-1.onrender.com/api/productos";

    let editandoId = null;

    window.onload = cargarProductos;

    function cargarProductos() {
      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          const lista = document.getElementById("lista");
          lista.innerHTML = "";

          data.forEach(p => {
            lista.innerHTML += `
              <div class="card">
                <img src="${p.imagen || 'https://via.placeholder.com/300'}">
                <h3>${p.nombre}</h3>
                <p><strong>$${p.precio}</strong></p>
                <p>Talla: ${p.talla}</p>

                <button onclick="editarProducto(${p.id}, \`${p.nombre}\`, ${p.precio}, \`${p.talla}\`, \`${p.imagen || ""}\`)">Editar</button>
                <button onclick="eliminarProducto(${p.id})">Eliminar</button>
              </div>
            `;
          });
        })
        .catch(error => {
          console.error("ERROR:", error);
          alert("No se pudieron cargar los productos");
        });
    }

    function editarProducto(id, nombre, precio, talla, imagen) {
      document.getElementById("nombre").value = nombre;
      document.getElementById("precio").value = precio;
      document.getElementById("talla").value = talla;
      document.getElementById("imagen").value = imagen || "";

      editandoId = id;
    }

    function agregarProducto() {
      const nombre = document.getElementById("nombre").value;
      const precio = document.getElementById("precio").value;
      const talla = document.getElementById("talla").value;
      const imagen = document.getElementById("imagen").value;

      if (!nombre || !precio || !talla) {
        alert("Completa todos los campos");
        return;
      }

      const metodo = editandoId ? "PUT" : "POST";
      const url = editandoId ? `${API_URL}/${editandoId}` : API_URL;

      fetch(url, {
        method: metodo,
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ nombre, precio, talla, imagen })
      })
      .then(res => {
        if (!res.ok) throw new Error("Error");
        return res.json();
      })
      .then(() => {
        editandoId = null;
        limpiarInputs();
        cargarProductos();
      })
      .catch(error => {
        console.error("ERROR:", error);
        alert("No se pudo guardar el producto");
      });
    }

    function eliminarProducto(id) {
      fetch(`${API_URL}/${id}`, {
        method: "DELETE"
      })
      .then(() => cargarProductos())
      .catch(error => {
        console.error("ERROR:", error);
        alert("No se pudo eliminar");
      });
    }

    function limpiarInputs() {
      document.getElementById("nombre").value = "";
      document.getElementById("precio").value = "";
      document.getElementById("talla").value = "";
      document.getElementById("imagen").value = "";
    }
  </script>

</body>
</html>
